# See the inline comments on how to expand/tweak this configuration file
name: Tests

on:
  push:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
      pull-requests: write
    strategy:
      # We want to see all failures:
      fail-fast: false
      matrix:
        os:
        - ["ubuntu", "ubuntu-latest"]
        config:
        # [Python version, visual name, tox env]
        - ["3.14", "6.2 on py3.14", "py314-plone62"]
        - ["3.10", "6.2 on py3.10", "py310-plone62"]

    runs-on: ${{ matrix.os[1] }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    name: ${{ matrix.config[1] }}
    steps:
    - uses: actions/checkout@v7
      with:
        persist-credentials: false
    - name: Install uv + caching
      uses: astral-sh/setup-uv@v9.0.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          setup.*
          tox.ini
          pyproject.toml
        python-version: ${{ matrix.config[0] }}
    - name: locale
      # needed for CMFPlone testUnicodeSplitter test
      run: |
        sudo locale-gen nl_NL@euro
        sudo update-locale

##
# Add extra configuration options in .meta.toml:
#  [github]
#  extra_lines_after_os_dependencies = """
#  _your own configuration lines_
#  """
##
    - name: Initialize tox
      # the bash one-liner below does not work on Windows
      if: contains(matrix.os, 'ubuntu')
      run: |
        if [ `uvx tox list --no-desc -f init|wc -l` = 1 ]; then uvx --with tox-uv tox -e init;else true; fi
    - name: Test
      run: uvx --with tox-uv tox -e ${{ matrix.config[2] }}


